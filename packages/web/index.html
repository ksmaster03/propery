<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ระบบบริหารสัญญาเช่าพื้นที่เชิงพาณิชย์ กรมท่าอากาศยาน" />
    <title>DOA · ระบบบริหารสัญญาเช่าพื้นที่เชิงพาณิชย์</title>

    <!-- Preconnect — ให้โหลด font เร็วขึ้น -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts: โหลดเฉพาะที่ใช้จริง (Noto Sans Thai + IBM Plex Mono) -->
    <!-- ลด weight เหลือเท่าที่ใช้จริงใน UI — 400/500/700 -->
    <!-- ใช้ media=print onload trick เพื่อไม่ block render -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      media="print"
      onload="this.media='all'"
    />

    <!-- Material Icons: ใช้เฉพาะ Outlined + Round (async เช่นเดียวกัน) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined|Material+Icons+Round"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined|Material+Icons+Round"
      media="print"
      onload="this.media='all'"
    />

    <!-- Fallback สำหรับเบราว์เซอร์ที่ disable JS -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap" />
      <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" />
    </noscript>

    <!-- บังคับ font ที่ระดับ html/body กันไม่ให้ fallback เป็น system font (Segoe UI) -->
    <style>
      html, body, #root {
        font-family: 'Noto Sans Thai', system-ui, -apple-system, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        margin: 0;
        padding: 0;
        background: #f0f4fa;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
